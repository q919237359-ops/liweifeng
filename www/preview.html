<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>鱼管家</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    :root {
      --bg: #eef6f1;
      --deck: #f9fcf8;
      --panel: rgba(255, 255, 255, .86);
      --panel-solid: #ffffff;
      --ink: #0d1f17;
      --muted: #60756a;
      --quiet: #8a9a90;
      --line: rgba(13, 31, 23, .1);
      --line-strong: rgba(13, 31, 23, .18);
      --deep: #063f2c;
      --green: #0f7a4c;
      --aqua: #1aa7a1;
      --aqua-soft: #e5f8f6;
      --leaf: #dff3e4;
      --blue: #285bd4;
      --blue-soft: #eaf1ff;
      --amber: #b97615;
      --amber-soft: #fff1d7;
      --danger: #bf3b26;
      --danger-soft: #fff0ed;
      --shadow: 0 18px 44px rgba(8, 43, 30, .12);
      --shadow-soft: 0 10px 24px rgba(8, 43, 30, .08);
      --radius: 22px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { background: var(--bg); }
    body {
      margin: 0; min-height: 100dvh; color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 18% 4%, rgba(26, 167, 161, .16), transparent 30%),
        radial-gradient(circle at 88% 14%, rgba(185, 118, 21, .12), transparent 27%),
        linear-gradient(180deg, #f7fbf7 0%, #eef6f1 44%, #eaf2ee 100%);
      padding-bottom: calc(104px + var(--safe-bottom));
      overflow-x: hidden;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; border: 0; }
    .app { width: min(1180px, 100%); margin: 0 auto; padding: 12px 12px 28px; }
    .topbar {
      position: sticky; top: 0; z-index: 30;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      margin: 0 -12px 12px; padding: 10px 12px;
      background: rgba(238, 246, 241, .86);
      border-bottom: 1px solid rgba(13, 31, 23, .08);
      backdrop-filter: blur(18px);
    }
    .brand { display: flex; align-items: center; min-width: 0; gap: 10px; }
    .brand img { width: 42px; height: 42px; border-radius: 12px; box-shadow: 0 10px 22px rgba(6, 63, 44, .18); }
    .brand-title { font-size: 20px; font-weight: 950; line-height: 1.05; }
    .brand-sub { margin-top: 4px; color: var(--muted); font-size: 12px; font-weight: 800; }
    .live-chip {
      display: inline-flex; align-items: center; gap: 8px; min-height: 36px;
      padding: 0 12px; border: 1px solid rgba(15, 122, 76, .16);
      border-radius: 999px; background: rgba(255, 255, 255, .72);
      color: var(--deep); font-size: 12px; font-weight: 900; white-space: nowrap;
    }
    .live-chip::before { content: ""; width: 8px; height: 8px; border-radius: 999px; background: #20c66b; box-shadow: 0 0 0 5px rgba(32, 198, 107, .13); }
    .screen { display: none; }
    .screen.active { display: block; animation: screen-in .22s ease-out; }
    h1, h2, h3, p { margin: 0; }
    .status-badge {
      display: inline-flex; align-items: center; min-height: 26px; padding: 0 9px;
      border-radius: 999px; background: rgba(255, 241, 215, .94);
      color: #7c4b08; font-size: 11px; font-weight: 950; white-space: nowrap;
    }
    .status-badge.green { background: rgba(232, 244, 237, .94); color: var(--green); }
    .bottom-sheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
      padding: 9px 10px calc(9px + var(--safe-bottom));
      background: rgba(255,255,255,.88);
      border-top: 1px solid rgba(13,31,23,.09);
      backdrop-filter: blur(18px);
      box-shadow: 0 -12px 34px rgba(8,43,30,.11);
    }
    .nav-shell { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 5px; max-width: 590px; margin: 0 auto; padding: 3px; border: 1px solid var(--line); border-radius: 18px; background: rgba(238,246,241,.86); }
    .nav-button { min-width: 0; min-height: 46px; border-radius: 14px; background: transparent; color: var(--muted); font-size: 12px; font-weight: 950; transition: all .14s ease; }
    .nav-button.active { background: var(--deep); color: white; box-shadow: 0 10px 22px rgba(6,63,44,.18); }
    .nav-button:active { transform: scale(.98); }
    @keyframes screen-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* 水面指挥台 */
    .water-console {
      position: relative; overflow: hidden; min-height: 420px; padding: 16px;
      border: 1px solid rgba(6, 63, 44, .12); border-radius: 30px;
      background: linear-gradient(145deg, rgba(6,63,44,.98), rgba(12,105,75,.95) 56%, rgba(28,132,121,.9)),
        radial-gradient(circle at 70% 78%, rgba(255,255,255,.16), transparent 38%);
      color: white; box-shadow: var(--shadow);
    }
    .map-stage { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); grid-auto-rows: 54px; gap: 8px; margin-top: 18px; }
    .pond-node {
      position: relative; min-height: 52px;
      border: 1px solid rgba(255,255,255,.22); border-radius: 19px;
      background: rgba(255,255,255,.12); color: white;
      box-shadow: 0 1px 0 rgba(255,255,255,.16) inset;
      transition: transform .16s ease, background .16s ease;
    }
    .pond-node[data-span="2"] { grid-column: span 2; }
    .pond-node[data-row="2"] { grid-row: span 2; }
    .pond-node.active { background: rgba(255,255,255,.92); color: var(--deep); border-color: rgba(255,255,255,.8); transform: translateY(-2px); }
    .pond-node.warn { background: rgba(255, 241, 215, .18); border-color: rgba(255, 215, 145, .5); }
    .node-number { position: absolute; top: 9px; left: 10px; font-size: 18px; font-weight: 950; }
    .node-status { position: absolute; right: 9px; bottom: 8px; opacity: .82; font-size: 10px; font-weight: 950; }
    .selected-panel { display: grid; gap: 10px; margin-top: 12px; padding: 12px; border: 1px solid rgba(255,255,255,.2); border-radius: 22px; background: rgba(255,255,255,.12); backdrop-filter: blur(12px); position: relative; z-index: 1; }
    .selected-title { display: flex; align-items: start; justify-content: space-between; gap: 12px; }
    .selected-title h2 { font-size: 22px; line-height: 1.1; font-weight: 950; }
    .selected-title p { margin-top: 4px; color: rgba(255,255,255,.76); font-size: 12px; font-weight: 850; }
    .selected-metrics { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .glass-metric { min-width: 0; padding: 11px 10px; border-radius: 16px; background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.16); }
    .glass-label { color: rgba(255,255,255,.68); font-size: 10px; font-weight: 900; }
    .glass-value { margin-top: 6px; font-size: 16px; line-height: 1.05; font-weight: 950; }
    .selected-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .selected-actions button { min-height: 44px; border-radius: 14px; font-size: 14px; font-weight: 950; transition: transform .14s ease; }
    .selected-actions button:first-child { background: white; color: var(--green); box-shadow: 0 10px 24px rgba(0,0,0,.12); }
    .selected-actions button:last-child { border: 1px solid rgba(255,255,255,.22); background: rgba(255,255,255,.1); color: white; }
    .selected-actions button:active { transform: scale(.98); }

    /* 任务卡片 */
    .mission-rail { display: grid; gap: 12px; }
    .rail-card { border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); box-shadow: var(--shadow-soft); backdrop-filter: blur(12px); padding: 14px; }
    .rail-head { display: flex; align-items: start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .rail-title { font-size: 18px; line-height: 1.2; font-weight: 950; }
    .rail-note { margin-top: 4px; color: var(--muted); font-size: 12px; font-weight: 800; line-height: 1.35; }
    .task-list { display: grid; gap: 9px; }
    .task-card { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center; padding: 11px; border: 1px solid var(--line); border-radius: var(--radius); background: white; }
    .task-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 5px rgba(15,122,76,.1); }
    .task-dot.warn { background: var(--amber); box-shadow: 0 0 0 5px rgba(185,118,21,.11); }
    .task-title { font-size: 14px; font-weight: 950; }
    .task-meta { margin-top: 3px; color: var(--muted); font-size: 12px; font-weight: 800; }
    .task-time { color: var(--quiet); font-size: 12px; font-weight: 900; white-space: nowrap; }

    /* 库存 */
    .inventory-card { overflow: hidden; padding: 14px; border: 1px solid var(--line); border-radius: var(--radius); background: white; box-shadow: var(--shadow-soft); }
    .inventory-top { display: flex; align-items: start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .inventory-name { font-size: 18px; font-weight: 950; }
    .inventory-value { color: var(--green); font-size: 18px; font-weight: 950; white-space: nowrap; }
    .level-track { position: relative; overflow: hidden; height: 16px; border-radius: 999px; background: #e2ece5; }
    .level-track span { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--green), var(--aqua)); }
    .warehouse-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; }
    .pill { display: inline-flex; align-items: center; min-height: 28px; padding: 0 9px; border: 1px solid rgba(185,118,21,.18); border-radius: 999px; background: var(--amber-soft); color: #835109; font-size: 12px; font-weight: 900; }
    .pill.low { background: var(--danger-soft); color: var(--danger); border-color: rgba(191,59,38,.18); }

    /* 设置页 */
    .setting-section { margin-top: 16px; }
    .setting-section h3 { font-size: 18px; font-weight: 950; margin-bottom: 12px; }
    .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; border: 1px solid var(--line); border-radius: 16px; background: white; margin-bottom: 8px; }
    .setting-item-name { font-weight: 900; }
    .setting-item-value { color: var(--muted); font-size: 14px; }

    /* 弹窗 */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.5); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      width: 100%; max-width: 420px; max-height: 85vh; overflow-y: auto;
      background: white; border-radius: 24px; box-shadow: 0 24px 60px rgba(0,0,0,.25);
      animation: modal-in .25s ease-out;
    }
    @keyframes modal-in { from { opacity: 0; transform: scale(.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 18px 0;
    }
    .modal-header h2 { font-size: 20px; font-weight: 950; }
    .modal-close { width: 36px; height: 36px; border-radius: 50%; background: var(--line); display: grid; place-items: center; font-size: 18px; color: var(--muted); }
    .modal-body { padding: 16px 18px 20px; }
    .form-field { margin-bottom: 14px; }
    .form-field label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 12px; font-weight: 900; }
    .form-field input, .form-field select, .form-field textarea {
      width: 100%; min-height: 44px; padding: 0 12px;
      border: 1px solid var(--line-strong); border-radius: 14px;
      background: #f8fbf9; font-size: 15px; outline: 0;
    }
    .form-field input:focus, .form-field select:focus { border-color: rgba(15,122,76,.62); box-shadow: 0 0 0 3px rgba(15,122,76,.12); }
    .choice-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 7px; }
    .choice-pill {
      min-height: 34px; padding: 0 12px;
      border: 1px solid var(--line-strong); border-radius: 12px;
      background: #f8fbf9; color: var(--ink); font-size: 14px; font-weight: 900;
      transition: all .14s ease;
    }
    .choice-pill.active { border-color: rgba(15,122,76,.34); background: #e8f4ed; color: var(--green); }
    .choice-pill:active { transform: scale(.98); }
    .btn-primary { width: 100%; min-height: 48px; border-radius: 14px; background: var(--green); color: white; font-size: 16px; font-weight: 950; margin-top: 8px; transition: transform .14s ease; }
    .btn-primary:active { transform: scale(.98); }
    .btn-cancel { width: 100%; min-height: 44px; border-radius: 14px; background: var(--line); color: var(--muted); font-size: 14px; font-weight: 900; margin-top: 8px; }

    /* 喂料弹窗专属 */
    .feed-pond-info { padding: 12px; border-radius: 16px; background: #e8f4ed; margin-bottom: 14px; }
    .feed-pond-name { font-size: 18px; font-weight: 950; }
    .feed-pond-species { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .stock-hint { display: flex; gap: 8px; margin-top: 10px; }
    .stock-chip { padding: 4px 10px; border-radius: 8px; background: white; font-size: 12px; font-weight: 900; }

    @media (max-width: 520px) {
      .map-stage { grid-template-columns: repeat(4, minmax(0, 1fr)); grid-auto-rows: 52px; }
      .selected-metrics { gap: 7px; }
      .glass-value { font-size: 14px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <img src="icon-192.png" alt="鱼管家" />
        <div>
          <div class="brand-title">鱼管家</div>
          <div class="brand-sub">水面指挥台 · 喂料库存联动</div>
        </div>
      </div>
      <div class="live-chip" id="syncStatus">在线同步</div>
    </header>

    <!-- 首页 -->
    <section class="screen active" data-screen="home">
      <section class="water-console">
        <div class="console-head">
          <div style="color:rgba(255,255,255,.7); font-size:11px; font-weight:950; letter-spacing:.1em; text-transform:uppercase;">今日概览</div>
          <h1 style="max-width:12em; margin-top:8px; font-size:32px; line-height:1.03; font-weight:950;">鱼塘处理</h1>
        </div>

        <div class="map-stage" id="pondMap"></div>

        <section class="selected-panel">
          <div class="selected-title">
            <div>
              <h2 id="selectedTitle">选择鱼塘</h2>
              <p id="selectedSubtitle">点击上方鱼塘查看详情</p>
            </div>
            <span class="status-badge green" id="selectedBadge">正常</span>
          </div>
          <div class="selected-actions">
            <button onclick="openFeedModal()">记录喂料</button>
            <button onclick="jumpToCalendar()">查看日历</button>
          </div>
          <div class="selected-metrics">
            <article class="glass-metric">
              <div class="glass-label">今日喂料</div>
              <div class="glass-value" id="selectedFeed">-</div>
            </article>
            <article class="glass-metric">
              <div class="glass-label">最后登记</div>
              <div class="glass-value" id="selectedTime">-</div>
            </article>
            <article class="glass-metric">
              <div class="glass-label">库存状态</div>
              <div class="glass-value" id="selectedStock">-</div>
            </article>
          </div>
        </section>
      </section>

      <aside class="mission-rail" style="margin-top:12px;">
        <section class="rail-card">
          <div class="rail-head">
            <div>
              <h2 class="rail-title">今日任务流</h2>
              <p class="rail-note">把"待登记、库存低、资料缺"放在同一条工作流里。</p>
            </div>
            <div style="display:grid;place-items:center;width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at center,white 0 56%,transparent 57%),conic-gradient(var(--green) 0 78%,#dce9df 78% 100%);color:var(--deep);font-size:16px;font-weight:950;" id="taskScore">0</div>
          </div>
          <div class="task-list" id="taskList"></div>
        </section>

        <section style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
          <article style="padding:13px 12px;border:1px solid var(--line);border-radius:18px;background:white;">
            <div style="color:var(--muted);font-size:11px;font-weight:900;">已登记</div>
            <div style="margin-top:8px;font-size:23px;font-weight:950;" id="statFed">0</div>
          </article>
          <article style="padding:13px 12px;border:1px solid var(--line);border-radius:18px;background:white;">
            <div style="color:var(--muted);font-size:11px;font-weight:900;">显示塘</div>
            <div style="margin-top:8px;font-size:23px;font-weight:950;" id="statPonds">0</div>
          </article>
          <article style="padding:13px 12px;border:1px solid var(--line);border-radius:18px;background:white;">
            <div style="color:var(--muted);font-size:11px;font-weight:900;">预警</div>
            <div style="margin-top:8px;font-size:23px;font-weight:950;color:var(--amber);" id="statWarn">0</div>
          </article>
        </section>
      </aside>
    </section>

    <!-- 库存页 -->
    <section class="screen" data-screen="inventory">
      <div class="section-head">
        <div>
          <h2 class="section-title">当前库存</h2>
        </div>
      </div>
      <div id="inventoryList" style="display:grid;gap:12px;"></div>
    </section>

    <!-- 周期页 -->
    <section class="screen" data-screen="pond">
      <div class="section-head">
        <div>
          <h2 class="section-title" id="pondDetailTitle">选择鱼塘</h2>
          <p class="section-note" id="pondDetailSub">点击首页鱼塘查看周期详情</p>
        </div>
        <span class="status-badge green" id="pondDetailBadge">同步正常</span>
      </div>
      <section class="cycle-grid" id="pondCycleGrid" style="margin-top:14px;display:grid;gap:12px;"></section>
    </section>

    <!-- 日志页 -->
    <section class="screen" data-screen="memo">
      <section style="display:grid;gap:12px;">
        <div style="padding:14px;border:1px solid var(--line);border-radius:var(--radius);background:white;">
          <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px;">
            <h2 class="rail-title">新增现场日志</h2>
            <span class="status-badge">记录</span>
          </div>
          <div style="display:grid;gap:10px;">
            <div class="form-field">
              <label>日期</label>
              <input type="date" id="memoDate" />
            </div>
            <div class="form-field">
              <label>鱼塘</label>
              <div class="choice-row" id="memoPondRow"></div>
            </div>
            <div class="form-field">
              <label>动作</label>
              <div class="choice-row">
                <button class="choice-pill active" type="button" data-group="memoAction" data-value="换水" onclick="selectChoice(this)">换水</button>
                <button class="choice-pill" type="button" data-group="memoAction" data-value="消毒" onclick="selectChoice(this)">消毒</button>
                <button class="choice-pill" type="button" data-group="memoAction" data-value="投药" onclick="selectChoice(this)">投药</button>
                <button class="choice-pill" type="button" data-group="memoAction" data-value="测水质" onclick="selectChoice(this)">测水质</button>
              </div>
            </div>
            <div class="form-field">
              <label>备注</label>
              <textarea id="memoText" placeholder="例如：上午换水一次，鱼状态正常" style="min-height:90px;padding:12px;border:1px solid var(--line-strong);border-radius:14px;resize:vertical;font-size:15px;"></textarea>
            </div>
            <button class="btn-primary" onclick="saveMemo()">保存日志</button>
          </div>
        </div>
        <div id="memoList" style="display:grid;gap:8px;"></div>
      </section>
    </section>

    <!-- 设置页 -->
    <section class="screen" data-screen="settings">
      <div class="section-head">
        <div>
          <h2 class="section-title">控制室</h2>
          <p class="section-note">管理鱼塘、仓库、饲料规格</p>
        </div>
      </div>
      <div style="display:grid;gap:16px;">
        <section class="setting-section">
          <h3>鱼塘资料</h3>
          <div id="pondSettings" style="display:grid;gap:8px;"></div>
        </section>
        <section class="setting-section">
          <h3>仓库资料</h3>
          <div id="warehouseSettings" style="display:grid;gap:8px;"></div>
        </section>
        <section class="setting-section">
          <h3>饲料规格</h3>
          <div id="feedSettings" style="display:grid;gap:8px;"></div>
        </section>
      </div>
    </section>
  </main>

  <!-- 喂料弹窗 -->
  <div class="modal-overlay" id="feedModal">
    <div class="modal">
      <div class="modal-header">
        <h2>记录喂料</h2>
        <button class="modal-close" onclick="closeFeedModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="feed-pond-info">
          <div class="feed-pond-name" id="modalPondName">-</div>
          <div class="feed-pond-species" id="modalPondSpecies">-</div>
          <div class="stock-hint">
            <span class="stock-chip" id="modalWarehouse">-</span>
            <span class="stock-chip" id="modalStock">-</span>
          </div>
        </div>
        <div class="form-field">
          <label>饲料</label>
          <div class="choice-row" id="feedNameRow"></div>
        </div>
        <div class="form-field">
          <label>数量（包/斤）</label>
          <input type="number" id="feedAmount" placeholder="请输入数量" inputmode="decimal" />
        </div>
        <div class="form-field">
          <label>单位</label>
          <div class="choice-row">
            <button class="choice-pill active" type="button" data-group="feedUnit" data-value="bag" onclick="selectChoice(this)">包</button>
            <button class="choice-pill" type="button" data-group="feedUnit" data-value="jin" onclick="selectChoice(this)">斤</button>
          </div>
        </div>
        <div class="form-field">
          <label>备注</label>
          <input type="text" id="feedNote" placeholder="选填" />
        </div>
        <button class="btn-primary" onclick="saveFeed()">保存并扣库存</button>
        <button class="btn-cancel" onclick="closeFeedModal()">取消</button>
      </div>
    </div>
  </div>

  <nav class="bottom-sheet">
    <div class="nav-shell">
      <button class="nav-button active" data-target="home" onclick="showPage('home')">指挥台</button>
      <button class="nav-button" data-target="inventory" onclick="showPage('inventory')">库存</button>
      <button class="nav-button" data-target="pond" onclick="showPage('pond')">周期</button>
      <button class="nav-button" data-target="memo" onclick="showPage('memo')">日志</button>
      <button class="nav-button" data-target="settings" onclick="showPage('settings')">控制室</button>
    </div>
  </nav>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>
    // === 数据变量 ===
    let ponds = [], warehouses = [], feedSpecs = { eelBagJin: 40 };
    let feedRecords = [], stockLogs = [], stockTotals = {}, pondMemos = [], cycleStarts = {};
    let selectedPondId = '1';
    let currentFeedPondId = '';

    const CACHE_KEY = 'fishpond_cache';
    const CACHE_VERSION = 1;

    const COMMON_FEEDS = ['生鱼料', '鳗鱼料', '加州鲈料', '普通饲料'];

    // === 缓存 ===
    function saveCache() {
      try { localStorage.setItem(CACHE_KEY, JSON.stringify({ v: CACHE_VERSION, ponds, warehouses, feedSpecs, feedRecords, stockLogs, stockTotals, pondMemos, cycleStarts })); } catch(e) {}
    }
    function loadCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return false;
        const c = JSON.parse(raw);
        if (c.v !== CACHE_VERSION) return false;
        ponds = c.ponds || ponds; warehouses = c.warehouses || warehouses;
        feedSpecs = c.feedSpecs || feedSpecs; feedRecords = c.feedRecords || feedRecords;
        stockLogs = c.stockLogs || stockLogs; stockTotals = c.stockTotals || stockTotals;
        pondMemos = c.pondMemos || pondMemos; cycleStarts = c.cycleStarts || cycleStarts;
        return true;
      } catch(e) { return false; }
    }

    // === 工具函数 ===
    function objectList(val) {
      if (!val) return [];
      if (Array.isArray(val)) return val;
      return Object.entries(val).map(([id, v]) => ({ id, ...(v || {}) }));
    }
    function todayStr() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function nowTime(ts) { if (!ts) return '-'; const d = new Date(Number(ts)); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
    function isEelFeed(name) { return (name || '').includes('鳗鱼'); }
    function bagJin(name) { return isEelFeed(name) ? (feedSpecs.eelBagJin || 40) : 40; }
    function fmt(n, d=0) { return Number(n || 0).toFixed(d).replace(/\.0+$/, ''); }
    function stockKey(whId, feed) { return `${whId}__${feed}`; }

    // === 页面导航 ===
    function showPage(name) {
      document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.dataset.screen === name));
      document.querySelectorAll('.nav-button').forEach(b => b.classList.toggle('active', b.dataset.target === name));
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // === 选择按钮 ===
    function selectChoice(btn) {
      const group = btn.dataset.group;
      btn.parentElement.querySelectorAll('.choice-pill').forEach(p => p.classList.toggle('active', p === btn));
    }
    function getChoiceValue(group) {
      const active = document.querySelector(`.choice-pill[data-group="${group}"].active`);
      return active ? active.dataset.value : '';
    }

    // === 渲染鱼塘地图 ===
    function renderPondMap() {
      const map = document.getElementById('pondMap');
      const today = todayStr();
      const todayRecords = feedRecords.filter(r => r.date === today && !r.cancelled);
      
      const activePonds = ponds.filter(p => p.species && p.species !== '空塘');
      
      map.innerHTML = activePonds.map(p => {
        const pondRecords = todayRecords.filter(r => r.pondId === p.id);
        const hasFed = pondRecords.length > 0;
        const statusText = hasFed ? '已登记' : '待登记';
        const isActive = p.id === selectedPondId;
        const isWarn = !hasFed;
        
        return `<button class="pond-node ${isActive ? 'active' : ''} ${isWarn ? 'warn' : ''}" 
          data-pond="${p.id}" onclick="selectPond('${p.id}')">
          <span class="node-number">${p.name || p.id}</span>
          <span class="node-status">${statusText}</span>
        </button>`;
      }).join('');

      // 更新统计
      const fedCount = new Set(todayRecords.map(r => r.pondId)).size;
      document.getElementById('statFed').textContent = fedCount;
      document.getElementById('statPonds').textContent = activePonds.length;
      document.getElementById('statWarn').textContent = activePonds.length - fedCount;
    }

    // === 选择鱼塘 ===
    function selectPond(pondId) {
      selectedPondId = pondId;
      const pond = ponds.find(p => p.id === pondId);
      if (!pond) return;

      document.getElementById('selectedTitle').textContent = `${pond.name || pond.id}号塘`;
      document.getElementById('selectedSubtitle').textContent = `${pond.species || '未知'} · ${pond.id}`;

      const today = todayStr();
      const todayRecords = feedRecords.filter(r => r.date === today && !r.cancelled && r.pondId === pondId);
      
      if (todayRecords.length > 0) {
        const total = todayRecords.reduce((s, r) => s + Number(r.amount || 0), 0);
        const unit = isEelFeed(pond.species) ? '斤' : '包';
        document.getElementById('selectedFeed').textContent = `${fmt(total)}${unit}`;
        document.getElementById('selectedBadge').textContent = '正常';
        document.getElementById('selectedBadge').className = 'status-badge green';
        document.getElementById('selectedTime').textContent = nowTime(todayRecords[todayRecords.length - 1].createdAt);
      } else {
        document.getElementById('selectedFeed').textContent = '今日未登记';
        document.getElementById('selectedBadge').textContent = '需处理';
        document.getElementById('selectedBadge').className = 'status-badge';
        document.getElementById('selectedTime').textContent = '待登记';
      }
      
      document.getElementById('selectedStock').textContent = '查看库存';

      // 更新周期页
      document.getElementById('pondDetailTitle').textContent = `${pond.name || pond.id}号塘`;
      document.getElementById('pondDetailSub').textContent = `${pond.species || '未知'} · 养殖中`;

      renderPondMap();
    }

    // === 渲染任务列表 ===
    function renderTasks() {
      const today = todayStr();
      const todayRecords = feedRecords.filter(r => r.date === today && !r.cancelled);
      const activePonds = ponds.filter(p => p.species && p.species !== '空塘');
      const unfedPonds = activePonds.filter(p => !todayRecords.some(r => r.pondId === p.id));
      
      const lowStockItems = Object.entries(stockTotals).filter(([key, val]) => {
        const stock = typeof val === 'object' ? val.stockJin || 0 : val;
        return stock > 0 && stock < 500; // 低于500斤预警
      });

      let score = 100 - unfedPonds.length * 5 - lowStockItems.length * 5;
      score = Math.max(0, Math.min(100, score));
      document.getElementById('taskScore').textContent = score;

      const tasks = [];
      unfedPonds.slice(0, 3).forEach(p => {
        tasks.push(`<article class="task-card">
          <span class="task-dot warn"></span>
          <div><div class="task-title">${p.name || p.id}号塘未登记</div><div class="task-meta">建议先补今日喂料</div></div>
          <div class="task-time">现在</div>
        </article>`);
      });
      
      if (todayRecords.length > 0) {
        tasks.push(`<article class="task-card">
          <span class="task-dot"></span>
          <div><div class="task-title">${todayRecords.length} 条记录已同步</div><div class="task-meta">Firebase 在线，数据正常</div></div>
          <div class="task-time">${nowTime(todayRecords[0].createdAt)}</div>
        </article>`);
      }

      document.getElementById('taskList').innerHTML = tasks.join('') || '<div class="task-card"><div class="task-title">暂无任务</div></div>';
    }

    // === 渲染库存 ===
    function renderInventory() {
      const list = document.getElementById('inventoryList');
      const feedMap = {};
      
      Object.entries(stockTotals).forEach(([key, val]) => {
        const stock = typeof val === 'object' ? val.stockJin || 0 : val;
        const feedName = typeof val === 'object' ? (val.feedName || key.split('__')[1] || key) : key.split('__')[1] || key;
        if (!feedMap[feedName]) feedMap[feedName] = 0;
        feedMap[feedName] += stock;
      });

      if (Object.keys(feedMap).length === 0) {
        list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);">暂无库存数据</div>';
        return;
      }

      const maxStock = Math.max(...Object.values(feedMap), 1);

      list.innerHTML = Object.entries(feedMap).map(([name, stock]) => {
        const pct = Math.min(100, (stock / maxStock) * 100);
        const isLow = stock < 500;
        return `<article class="inventory-card">
          <div class="inventory-top">
            <h3 class="inventory-name">${name}</h3>
            <div class="inventory-value" style="${isLow ? 'color:var(--amber)' : ''}">${fmt(stock, 1)}斤</div>
          </div>
          <div class="level-track"><span style="width:${pct}%;${isLow ? 'background:linear-gradient(90deg,#b97615,#e7a62f)' : ''}"></span></div>
          <div class="warehouse-row">
            <span class="pill ${isLow ? 'low' : ''}">${isLow ? '低库存' : '正常'}</span>
          </div>
        </article>`;
      }).join('');
    }

    // === 渲染设置页 ===
    function renderSettings() {
      // 鱼塘
      document.getElementById('pondSettings').innerHTML = ponds.map(p => 
        `<div class="setting-item">
          <div class="setting-item-name">${p.name || p.id}号塘</div>
          <div class="setting-item-value">${p.species || '未设置'}</div>
        </div>`
      ).join('') || '<div style="padding:14px;color:var(--muted);">暂无鱼塘数据</div>';

      // 仓库
      document.getElementById('warehouseSettings').innerHTML = warehouses.map(w => 
        `<div class="setting-item">
          <div class="setting-item-name">${w.name || w.id}</div>
          <div class="setting-item-value">${w.active !== false ? '启用' : '停用'}</div>
        </div>`
      ).join('') || '<div style="padding:14px;color:var(--muted);">暂无仓库数据</div>';

      // 饲料规格
      document.getElementById('feedSettings').innerHTML = `
        <div class="setting-item">
          <div class="setting-item-name">鳗鱼料每包斤数</div>
          <div class="setting-item-value">${feedSpecs.eelBagJin || 40}斤/包</div>
        </div>`;
    }

    // === 渲染日志 ===
    function renderMemos() {
      document.getElementById('memoDate').value = todayStr();
      
      // 鱼塘选择
      const pondRow = document.getElementById('memoPondRow');
      const activePonds = ponds.filter(p => p.species && p.species !== '空塘');
      pondRow.innerHTML = activePonds.map((p, i) => 
        `<button class="choice-pill ${i === 0 ? 'active' : ''}" type="button" data-group="memoPond" data-value="${p.id}" onclick="selectChoice(this)">${p.name || p.id}号塘</button>`
      ).join('');

      // 日志列表
      document.getElementById('memoList').innerHTML = pondMemos.slice(0, 10).map(m => 
        `<div style="padding:12px;border:1px solid var(--line);border-radius:16px;background:white;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-weight:950;">${m.pondName || m.pondId || '-'}</span>
            <span style="color:var(--muted);font-size:12px;">${m.date || ''}</span>
          </div>
          <div style="margin-top:6px;color:var(--muted);font-size:13px;">${m.action || ''} ${m.text || ''}</div>
        </div>`
      ).join('') || '<div style="padding:20px;text-align:center;color:var(--muted);">暂无日志</div>';
    }

    // === 喂料弹窗 ===
    function openFeedModal() {
      currentFeedPondId = selectedPondId;
      const pond = ponds.find(p => p.id === currentFeedPondId);
      if (!pond) return alert('请先选择一个鱼塘');

      document.getElementById('modalPondName').textContent = `${pond.name || pond.id}号塘`;
      document.getElementById('modalPondSpecies').textContent = pond.species || '未知';

      // 饲料选择
      const feedRow = document.getElementById('feedNameRow');
      const feeds = COMMON_FEEDS.filter(f => {
        if (isEelFeed(pond.species)) return f.includes('鳗鱼');
        return !f.includes('鳗鱼');
      });
      feedRow.innerHTML = feeds.map((f, i) => 
        `<button class="choice-pill ${i === 0 ? 'active' : ''}" type="button" data-group="feedName" data-value="${f}" onclick="selectChoice(this)">${f}</button>`
      ).join('');

      // 库存信息
      const defaultWh = warehouses[0];
      document.getElementById('modalWarehouse').textContent = defaultWh ? defaultWh.name : '仓库';
      document.getElementById('modalStock').textContent = '加载中...';

      document.getElementById('feedModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeFeedModal() {
      document.getElementById('feedModal').classList.remove('open');
      document.body.style.overflow = '';
    }

    function saveFeed() {
      const feedName = getChoiceValue('feedName');
      const amount = Number(document.getElementById('feedAmount').value);
      const unit = getChoiceValue('feedUnit') || 'bag';
      const note = document.getElementById('feedNote').value.trim();

      if (!feedName || !amount || amount <= 0) return alert('请选择饲料并输入数量');

      const pond = ponds.find(p => p.id === currentFeedPondId);
      const now = Date.now();

      // 保存到 Firebase
      const db = firebase.database();
      db.ref('feedRecords').push({
        date: todayStr(),
        pondId: currentFeedPondId,
        pondName: pond ? (pond.name || pond.id) : currentFeedPondId,
        species: pond ? pond.species : '',
        feedName, amount, unit,
        person: '', note,
        createdAt: now
      });

      alert('喂料已记录！');
      closeFeedModal();
      document.getElementById('feedAmount').value = '';
      document.getElementById('feedNote').value = '';
    }

    function saveMemo() {
      const pondId = getChoiceValue('memoPond');
      const action = getChoiceValue('memoAction');
      const text = document.getElementById('memoText').value.trim();
      const date = document.getElementById('memoDate').value;

      if (!pondId || !action) return alert('请选择鱼塘和动作');

      const pond = ponds.find(p => p.id === pondId);
      const db = firebase.database();
      db.ref('pondMemos').push({
        date, pondId,
        pondName: pond ? (pond.name || pond.id) : pondId,
        species: pond ? pond.species : '',
        action, text, createdAt: Date.now()
      });

      alert('日志已保存！');
      document.getElementById('memoText').value = '';
    }

    function jumpToCalendar() {
      showPage('pond');
    }

    // === Firebase 初始化 ===
    function initFirebase() {
      try {
        firebase.initializeApp({
          apiKey: "AIzaSyBJeTuuBP_1h1Igfz4W_03a38avmrssqjM",
          authDomain: "lwfsl-a0c62.firebaseapp.com",
          databaseURL: "https://lwfsl-a0c62-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "lwfsl-a0c62",
          storageBucket: "lwfsl-a0c62.firebasestorage.app",
          messagingSenderId: "103577638673",
          appId: "1:103577638673:web:0586e34f56c0f278336d46"
        });
        const db = firebase.database();

        loadCache();
        renderAll();

        db.ref('settings/ponds').on('value', snap => {
          ponds = objectList(snap.val());
          if (ponds.length === 0) ponds = [{id:'1',name:'1',species:'鳗鱼'},{id:'2',name:'2',species:'鳗鱼'},{id:'3',name:'3',species:'生鱼'}];
          saveCache(); renderAll();
        });

        db.ref('settings/warehouses').on('value', snap => {
          warehouses = objectList(snap.val());
          if (warehouses.length === 0) warehouses = [{id:'wh1',name:'1号仓库'}];
          saveCache(); renderAll();
        });

        db.ref('settings/feedSpecs').on('value', snap => {
          feedSpecs = { eelBagJin: 40, ...(snap.val() || {}) };
          saveCache();
        });

        db.ref('feedRecords').on('value', snap => {
          feedRecords = objectList(snap.val()).sort((a,b) => Number(b.createdAt||0) - Number(a.createdAt||0));
          saveCache(); renderAll();
        });

        db.ref('stockTotals').on('value', snap => {
          stockTotals = snap.val() || {};
          saveCache(); renderAll();
        });

        db.ref('stockLogs').on('value', snap => {
          stockLogs = objectList(snap.val()).sort((a,b) => Number(b.createdAt||0) - Number(a.createdAt||0));
          saveCache();
        });

        db.ref('pondMemos').on('value', snap => {
          pondMemos = objectList(snap.val());
          saveCache(); renderMemos();
        });

        document.getElementById('syncStatus').textContent = '在线同步 ' + new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
      } catch(err) {
        console.error('Firebase 连接失败：', err);
        document.getElementById('syncStatus').textContent = '连接失败';
      }
    }

    function renderAll() {
      renderPondMap();
      renderTasks();
      renderInventory();
      renderSettings();
      renderMemos();
      selectPond(selectedPondId);
    }

    // === 启动 ===
    document.addEventListener('DOMContentLoaded', () => {
      if (ponds.length === 0) {
        ponds = [
          {id:'1',name:'1',species:'鳗鱼'},{id:'2',name:'2',species:'鳗鱼'},
          {id:'3',name:'3',species:'生鱼'},{id:'4',name:'4',species:'鳗鱼'},
          {id:'5',name:'5',species:'生鱼'},{id:'8',name:'8',species:'生鱼'},
          {id:'9',name:'9',species:'生鱼'},{id:'10',name:'10',species:'鳗鱼'},
          {id:'11',name:'11',species:'鳗鱼'}
        ];
        warehouses = [{id:'wh1',name:'1号仓库'},{id:'wh2',name:'2号仓库'}];
      }
      initFirebase();
    });
  </script>
</body>
</html>
